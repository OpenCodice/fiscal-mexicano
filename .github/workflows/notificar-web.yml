name: Notificar a fiscal-web

# Cualquier cambio en los datos de main (merge del PR del watcher, push del
# enriquecimiento) manda un repository_dispatch a fiscal-web para que
# reingest.yml reconstruya el índice. Sin esto, fiscal-web solo se entera por
# su cron semanal de respaldo.
#
# Requiere el secret DISPATCH_TOKEN: un PAT con permiso de escritura sobre
# OpenCodice/fiscal-web (el GITHUB_TOKEN del job no puede disparar workflows
# de otro repo).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/**'

permissions: {}

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: repository_dispatch → fiscal-web (datos-actualizados)
        env:
          TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Falta el secret DISPATCH_TOKEN (PAT con acceso a OpenCodice/fiscal-web)."
            exit 1
          fi
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/OpenCodice/fiscal-web/dispatches \
            -d '{"event_type":"datos-actualizados","client_payload":{"sha":"${{ github.sha }}"}}'
          echo "Dispatch enviado: fiscal-web reingestará el índice."
