name: Revisar PR de reforma fiscal

# Se ejecuta en cada PR (los del watcher incluidos, gracias a PR_TOKEN). Dos partes:
#   validar — invariantes deterministas sobre el repo como quedaría tras el
#             merge. Es el GATE: required check en branch protection de main.
#   resumir — comentario asistido por LLM con resumen + banderas de corrupción
#             (como en el federal/estatales). Solo apoyo de revisión, no decide.

on:
  pull_request: {}

permissions:
  contents: read
  pull-requests: write

env:
  EXTRACTOR_REPO: https://github.com/OpenCodice/fiscal-extractor.git
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clonar extractor e instalar dependencias
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install -r /tmp/extractor/requirements.txt

      - name: Validar invariantes (GATE)
        run: |
          if PYTHONPATH=/tmp/extractor python -m extractor validar \
               --out "$GITHUB_WORKSPACE"; then
            echo "✅ Invariantes OK"
          else
            echo "::error::Invariantes ROTOS — no mergear"
            exit 1
          fi

  resumir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clonar extractor e instalar OpenAI
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install openai

      - name: Resumir cambios y comentar el PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Sin OPENAI_API_KEY: omito el resumen asistido."; exit 0
          fi
          git fetch -q origin "${{ github.base_ref }}"
          python /tmp/extractor/scripts/resumir_pr.py \
            "$GITHUB_WORKSPACE" "origin/${{ github.base_ref }}" > /tmp/resumen.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --body-file /tmp/resumen.md
