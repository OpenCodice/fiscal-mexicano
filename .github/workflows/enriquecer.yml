name: Generar enriquecimiento (LLM)

# Genera/actualiza la capa de enriquecimiento (metadata/<clave>/generado/) que
# mejora el recall del buscador del RAG ante preguntas coloquiales. NO es texto
# oficial ni fuente de cita: la verdad sigue en los .md y en pasajes.jsonl.
#
# Se dispara A MANO (no en cada reforma; el watcher vigilar-fiscal.yml solo
# reconstruye la capa determinista). El extractor descarga las fuentes del
# registro y procesa TODO el corpus en un comando; es incremental por hash
# (solo regenera las unidades cuyo texto cambió), salvo que uses 'force'.
#
# Requiere el secret OPENAI_API_KEY en este repo.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerar TODO (ignorar la caché por hash)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  EXTRACTOR_REPO: https://github.com/OpenCodice/fiscal-extractor.git
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  # Sin esto el log del runner se queda mudo durante documentos largos (la RMF
  # tarda decenas de minutos): el progreso por unidad sale con el buffer lleno.
  PYTHONUNBUFFERED: "1"

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo de datos
        uses: actions/checkout@v5
        with:
          # El push con GITHUB_TOKEN muere contra la branch protection de main
          # (required check 'validar'; el bot no es admin — GH006 comprobado).
          # El PAT del usuario sí la salta. Ojo: los pushes con PAT SÍ disparan
          # workflows; notificar-web ignora los de enriquecimiento por paths y
          # el dispatch a fiscal-web va una sola vez al final de este job.
          token: ${{ secrets.PR_TOKEN || github.token }}

      - name: Verificar que exista la API key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Falta el secret OPENAI_API_KEY en este repo."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clonar extractor e instalar dependencias
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install -r /tmp/extractor/requirements.txt openai

      # Un documento a la vez, con commit+push tras cada uno:
      # - El corpus completo (~5,460 unidades) excede el límite de 6 h por job
      #   de Actions; con checkpoints por documento, un job que muere conserva
      #   lo hecho y el siguiente run continúa del caché (huella de prompt +
      #   hash de texto en el extractor).
      # - OJO con los pathspecs de git: 'metadata/*/generado' (con comodín)
      #   debe casar la ruta COMPLETA del archivo, no sirve como prefijo; por
      #   eso se agrega el directorio exacto del documento.
      # - Estos pushes van con PR_TOKEN (ver checkout); notificar-web los
      #   ignora por paths y el dispatch a fiscal-web va una vez al final.
      - name: Generar enriquecimiento (por documento, autodescarga de fuentes)
        id: generar
        run: |
          set -o pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          export PYTHONPATH=/tmp/extractor
          docs=$(python -c "from extractor.registro import activos; print(' '.join(d.clave for d in activos()))")
          echo "Documentos: $docs"
          for doc in $docs; do
            python -m extractor enriquecer --doc "$doc" \
              --out "$GITHUB_WORKSPACE" \
              --proveedor openai ${{ inputs.force && '--force' || '' }} \
              | tee -a /tmp/enriquecer.log
            git add "metadata/$doc/generado"
            if git diff --cached --quiet; then
              echo "$doc: sin cambios"
              continue
            fi
            git commit -q -m "Enriquecimiento por LLM: $doc (generado en CI)"
            git pull -q --rebase origin main
            git push -q origin main
            echo "pusheado=true" >> "$GITHUB_OUTPUT"
          done

      - name: Resumen del avance
        if: always()
        run: |
          {
            echo "## Enriquecimiento"
            echo '```'
            # Líneas por documento (✓/✗ y stats); sin el avance unidad a unidad.
            grep -E '^[a-z0-9-]+ \(|^✗|^·|^Total:' /tmp/enriquecer.log || echo "(sin log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notificar a fiscal-web
        # Los pushes hechos con GITHUB_TOKEN no disparan otros workflows, así
        # que notificar-web.yml no ve este push: el dispatch va directo de aquí.
        if: steps.generar.outputs.pusheado == 'true'
        env:
          TOKEN: ${{ secrets.WEB_DISPATCH_TOKEN }}
        run: |
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/OpenCodice/fiscal-web/dispatches \
            -d '{"event_type":"datos-actualizados","client_payload":{"origen":"enriquecer"}}'
          echo "Dispatch enviado: fiscal-web reingestará el índice."
